<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Snippets | codebrib.dev</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container">
        <h1>📜 CLI Snippets</h1>
        <div class="grid">
            <div class="card">
                <h2>PowerShell: AD User Unlock</h2>
                <code onclick="copyToClipboard('Unlock-ADAccount -Identity ')">Unlock-ADAccount -Identity "username"</code>
            </div>
            <div class="card">
                <h2>Linux: Disk Space Check</h2>
                <code onclick="copyToClipboard('df -h')">df -h</code>
            </div>
            <div class="card">
                <h2>Network: Flush DNS</h2>
                <code onclick="copyToClipboard('ipconfig /flushdns')">ipconfig /flushdns</code>
            </div>
        </div>
    </div>
    <script src="assets/js/navigation.js"></script>
    <script src="assets/js/tools.js"></script>
</body>
</html>
